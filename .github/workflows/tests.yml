name: Tests

on:
  push:
    branches:
      - main
    paths:
      - 'cotton_bs5/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/tests.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'cotton_bs5/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

jobs:
  call-tests:
    uses: django-mvp/shared/.github/workflows/tests.yml@main
    with:
      coverage-package: cotton_bs5
    secrets: inherit
